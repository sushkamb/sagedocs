<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SageDocs - Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.04), 0 2px 4px rgba(0,0,0,0.06);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .login-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .login-brand-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #1e3a5f, #2563eb);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .login-brand h1 {
            font-size: 22px;
            font-weight: 700;
            color: #0f172a;
        }
        .login-subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d8dde8;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            color: #0f172a;
            background: #fff;
            transition: border-color 0.15s;
        }
        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        .btn-login {
            width: 100%;
            padding: 11px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-login:hover { background: #2563eb; }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-msg {
            color: #ef4444;
            font-size: 13px;
            margin-bottom: 14px;
            display: none;
        }
        .error-msg.visible { display: block; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-brand">
            <div class="login-brand-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            </div>
            <h1>SageDocs</h1>
        </div>
        <p class="login-subtitle">Sign in to the admin dashboard</p>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" class="form-input" id="username" autocomplete="username" required autofocus />
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" id="password" autocomplete="current-password" required />
            </div>
            <div class="error-msg" id="errorMsg"></div>
            <button type="submit" class="btn-login" id="btnLogin">Sign In</button>
        </form>
    </div>

    <script>
        (function () {
            var API_BASE = window.location.origin;

            // If already authenticated, redirect to dashboard
            var token = sessionStorage.getItem("sagedocs_admin_token");
            if (token) {
                fetch(API_BASE + "/api/admin/verify", {
                    headers: { "Authorization": "Bearer " + token }
                }).then(function (r) {
                    if (r.ok) window.location.href = "/admin/";
                });
            }

            document.getElementById("loginForm").addEventListener("submit", function (e) {
                e.preventDefault();
                var btn = document.getElementById("btnLogin");
                var errEl = document.getElementById("errorMsg");
                btn.disabled = true;
                errEl.classList.remove("visible");

                var username = document.getElementById("username").value;
                var password = document.getElementById("password").value;

                fetch(API_BASE + "/api/admin/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username: username, password: password })
                })
                .then(function (r) {
                    if (!r.ok) return r.json().then(function (d) { throw new Error(d.detail || "Login failed"); });
                    return r.json();
                })
                .then(function (data) {
                    sessionStorage.setItem("sagedocs_admin_token", data.token);
                    window.location.href = "/admin/";
                })
                .catch(function (err) {
                    errEl.textContent = err.message;
                    errEl.classList.add("visible");
                    btn.disabled = false;
                });
            });
        })();
    </script>
</body>
</html>
