name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, sagedocs]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run deploy script
        env:
          SRC_DIR: ${{ github.workspace }}
          SKIP_GIT_PULL: "1"
        run: sudo -E bash scripts/deploy.sh --update

      - name: Health check
        run: |
          for i in {1..15}; do
            if curl -sf http://127.0.0.1:8100/health; then
              echo "OK after $i attempt(s)"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed after 30s"
          exit 1
