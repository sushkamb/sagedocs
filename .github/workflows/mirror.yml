name: Mirror to ForteAIBot

on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to ForteHoldings/ForteAIBot
        env:
          FORTE_TOKEN: ${{ secrets.FORTE_TOKEN }}
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${FORTE_TOKEN}@github.com" > ~/.git-credentials
          git remote add forte https://github.com/ForteHoldings/ForteAIBot.git
          git push forte --all --force
          git push forte --tags --force
