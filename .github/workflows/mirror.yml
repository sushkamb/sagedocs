name: Mirror to ForteAIBot

on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Mirror to ForteHoldings/ForteAIBot
        env:
          FORTE_TOKEN: ${{ secrets.FORTE_TOKEN }}
        run: |
          git config --unset-all http.https://github.com/.extraheader || true
          git push "https://x-access-token:${FORTE_TOKEN}@github.com/ForteHoldings/ForteAIBot.git" --all --force
          git push "https://x-access-token:${FORTE_TOKEN}@github.com/ForteHoldings/ForteAIBot.git" --tags --force
