name: Mirror to ForteAIBot

on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug token
        run: |
          echo "Token length: ${#FORTE_TOKEN}"
          echo "First 4 chars: ${FORTE_TOKEN:0:4}"
        env:
          FORTE_TOKEN: ${{ secrets.FORTE_TOKEN }}

      - name: Mirror to ForteHoldings/ForteAIBot
        run: |
          git remote add forte https://x-access-token:${{ secrets.FORTE_TOKEN }}@github.com/ForteHoldings/ForteAIBot.git
          git push forte --all --force
          git push forte --tags --force
